<!DOCTYPE html>
<html>
  <head>
    <title>Appeals - K-9</title>
    <link rel="icon" href="/assets/K-9Logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
  </head>
  <body style="background-color: #8a8a8a">
    <link rel="stylesheet" href="main.css" />
    <section class="container">
      <div class="content">
        <link rel="stylesheet" href="navbar.css" />
        <div class="navbar">
          <div class="dropdown">
            <button class="dropbtn">
              Navigation &#x25BC;
              <i class="fa fa-caret-down"></i>
            </button>
            <div class="dropdown-content">
              <a onclick="location.href='./index.html'" href="#home">Home</a>
              <a
                onclick="location.href='./Support.html'"
                class="active"
                href="#support"
                >Support</a
              >
              <a onclick="location.href='./Request.html'" href="#request"
                >Feature request</a
              >
              <a onclick="location.href='./Appeal.html'" href="#appeal"
                >Ban appeals</a
              >
              <a onclick="location.href='./Report.html'" href="#report"
                >Reports</a
              >
              <a onclick="location.href='./gallery.html'" href="#gallery">Gallery</a>
            </div>
          </div>
        </div>
        <div class="main">
          <div class="strokeme" style="display: flex">
            <div style="margin: auto" ;>
              <h3>
                Got banned or muted? You can appeal here! If you recieve a
                friend request from <a href="https://discord.com/users/1037466389163814932" style="color: rgb(77, 221, 247); text-decoration: none;">@beepthemeep60</a> after appealing, accept it!
                :)
              </h3>
              <h4>If this form isn't working, or you would like to have a conversation about it, feel free to send me a DM!</h4>
              <img class="k9pic" src="/assets/K-9_4.jpg" alt="title" />
            </div>
          </div>
        </div>
        <br />
        <!-- Bootstrap CSS -->
        <div class="form">
          <div class="strokeme">
            <form onsubmit="sendContact(event)">
              <div class="mb-3">
                <label for="subjectInput" class="form-label"
                  >What's your discord username?</label
                >
                <br />
                <input class="form-control" id="subjectInput" />
              </div>
              <div class="mb-3">
                <label for="descriptionInput" class="form-label"
                  >Why should you be unbanned/unmuted?</label
                >
                <br />
                <textarea
                  class="form-control"
                  id="descriptionInput"
                  rows="3"
                ></textarea>
              </div>
              <button type="submit" class="btn btn-primary">Submit</button>
            </form>
            <script type="text/javascript" src="formAppeal.js"></script>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
